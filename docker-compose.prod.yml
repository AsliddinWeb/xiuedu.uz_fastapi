# ════════════════════════════════════════════════════════════════
#  XIU Edu — Production (LXC-compatible)
#
#  Portlar: nginx=8100, backend=8114, redis=ichki
#  Server nginx (80/443) → proxy_pass 127.0.0.1:8100
# ════════════════════════════════════════════════════════════════

services:
  redis:
    image: redis:7-alpine
    container_name: xiuedu_redis_prod
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb"]
    volumes:
      - xiuedu_redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xiuedu_prod_net
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiuedu_backend_prod
    restart: always
    env_file: .env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - xiuedu_mediadata:/app/media
    expose:
      - "8014"
    networks:
      - xiuedu_prod_net
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: xiuedu_frontend_builder
    volumes:
      - xiuedu_frontend_dist:/app/dist
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    container_name: xiuedu_nginx_prod
    restart: always
    depends_on:
      - backend
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - xiuedu_frontend_dist:/var/www/frontend:ro
      - xiuedu_mediadata:/var/www/media:ro
    ports:
      - "8100:80"
    networks:
      - xiuedu_prod_net
    security_opt:
      - no-new-privileges:true

volumes:
  xiuedu_redisdata:
  xiuedu_mediadata:
  xiuedu_frontend_dist:

networks:
  xiuedu_prod_net:
    driver: bridge
