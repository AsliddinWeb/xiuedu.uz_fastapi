# ════════════════════════════════════════════════════════════════
#  XIU Edu — Production deploy
#
#  DB is EXTERNAL (not in Docker).
#  Unique ports (conflict-free with other projects):
#    nginx  → 8100 (HTTP) / 8443 (HTTPS)
#    redis  → 6382 (host-only)
#    backend → 8114 (host-only)
#
#  Server's main nginx (80/443) → proxy_pass to 8100/8443
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d --build
# ════════════════════════════════════════════════════════════════

services:
  redis:
    image: redis:7-alpine
    container_name: xiuedu_redis_prod
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb"]
    volumes:
      - xiuedu_redisdata:/data
    ports:
      - "127.0.0.1:6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xiuedu_prod_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiuedu_backend_prod
    restart: always
    env_file: .env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - xiuedu_mediadata:/app/media
    ports:
      - "127.0.0.1:8114:8014"
    networks:
      - xiuedu_prod_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: xiuedu_frontend_builder
    volumes:
      - xiuedu_frontend_dist:/app/dist

  nginx:
    image: nginx:1.27-alpine
    container_name: xiuedu_nginx_prod
    restart: always
    depends_on:
      - backend
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - xiuedu_frontend_dist:/var/www/frontend:ro
      - xiuedu_mediadata:/var/www/media:ro
    ports:
      - "127.0.0.1:8100:80"
    networks:
      - xiuedu_prod_net

volumes:
  xiuedu_redisdata:
  xiuedu_mediadata:
  xiuedu_frontend_dist:

networks:
  xiuedu_prod_net:
    driver: bridge
