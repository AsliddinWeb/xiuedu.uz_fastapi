# ════════════════════════════════════════════════════════════════
#  XIU Edu — Docker ichidagi Nginx (port 80 da tinglaydi)
#
#  SSL server'ning ASOSIY nginx'i tomonidan boshqariladi.
#  Bu nginx faqat:
#    - Static frontend (SPA)
#    - API proxy → backend:8014
#    - Media fayllar
# ════════════════════════════════════════════════════════════════

upstream backend_upstream {
    server backend:8014;
}

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript
    application/xml+rss application/atom+xml
    image/svg+xml;

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # ── API → backend ──
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # ── Media files ──
    location ^~ /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Static assets (JS/CSS/fonts — long cache) ──
    location /assets/ {
        alias /var/www/frontend/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Robots & sitemap ──
    location = /robots.txt {
        proxy_pass http://backend_upstream/api/robots.txt;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://backend_upstream/api/sitemap.xml;
        access_log off;
    }

    # ── SPA fallback ──
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
