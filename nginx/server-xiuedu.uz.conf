# xiuedu.uz — Nginx config (Dockersiz)
#
# O'rnatish:
#   sudo cp nginx/server-xiuedu.uz.conf /etc/nginx/sites-available/xiuedu.uz
#   sudo ln -sfn /etc/nginx/sites-available/xiuedu.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d xiuedu.uz -d www.xiuedu.uz

server {
    listen 80;
    listen [::]:80;
    server_name xiuedu.uz www.xiuedu.uz;

    client_max_body_size 25M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    # API → backend (uvicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8014/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Media fayllar
    location ^~ /media/ {
        alias /var/www/xiuedu-media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets (JS/CSS — long cache)
    location /assets/ {
        alias /var/www/xiuedu/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Robots + Sitemap
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8014/api/robots.txt;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8014/api/sitemap.xml;
        access_log off;
    }

    # SPA — Vue Router fallback
    location / {
        root /var/www/xiuedu;
        index index.html;
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
