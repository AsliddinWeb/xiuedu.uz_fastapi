# ════════════════════════════════════════════════════════════════
#  xiuedu.uz — Server nginx config
#
#  Ko'chirish:
#    sudo cp /opt/xiuedu/nginx/server-xiuedu.uz.conf /etc/nginx/sites-available/xiuedu.uz
#    sudo ln -s /etc/nginx/sites-available/xiuedu.uz /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  SSL (keyin):
#    sudo certbot --nginx -d xiuedu.uz -d www.xiuedu.uz
#    Certbot ssl qatorlarni avtomatik qo'shadi.
# ════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name xiuedu.uz www.xiuedu.uz;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
        proxy_buffering off;
    }
}
