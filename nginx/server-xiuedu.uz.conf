# xiuedu.uz — Nginx config (Dockersiz)
#
# SSL: sudo certbot --nginx -d xiuedu.uz -d www.xiuedu.uz

server {
    listen 80;
    listen [::]:80;
    server_name xiuedu.uz www.xiuedu.uz;

    client_max_body_size 25M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    # API → backend
    location /api/ {
        proxy_pass http://127.0.0.1:8014/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Media
    location ^~ /media/ {
        alias /home/ubuntu/projects/xiuedu.uz_fastapi/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets
    location /assets/ {
        alias /home/ubuntu/projects/xiuedu.uz_fastapi/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Robots + Sitemap
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8014/api/robots.txt;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8014/api/sitemap.xml;
        access_log off;
    }

    # SPA fallback
    location / {
        root /home/ubuntu/projects/xiuedu.uz_fastapi/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
