# Legacy xiuedu.uz v1 → v2 URL map. Included from default.conf.
# Each entry: old path → new path, served as 301 permanent redirect.
#
# Use `map` directive in http context (declared in default.conf via include).

map $request_uri $legacy_redirect {
    default                                       "";

    # Old uz/ru/en prefixes
    ~^/uz/?$                                      /;
    ~^/ru/?$                                      /;
    ~^/en/?$                                      /;

    # News
    ~^/uz/news/(.*)$                              /news/$1;
    ~^/ru/news/(.*)$                              /news/$1;
    ~^/en/news/(.*)$                              /news/$1;
    ~^/news/(\d+)/(.+)$                           /news/$2;
    ~^/yangiliklar/(.+)$                          /news/$1;
    ~^/новости/(.+)$                              /news/$1;

    # Pages
    ~^/uz/page/(.+)$                              /p/$1;
    ~^/ru/page/(.+)$                              /p/$1;
    ~^/en/page/(.+)$                              /p/$1;
    ~^/uz/sahifa/(.+)$                            /p/$1;

    # Common static pages
    ~^/uz/biz-haqimizda/?$                        /about;
    ~^/biz-haqimizda/?$                           /about;
    ~^/o-nas/?$                                   /about;
    ~^/about-us/?$                                /about;

    ~^/uz/rahbariyat/?$                           /leadership;
    ~^/rahbariyat/?$                              /leadership;
    ~^/rukovodstvo/?$                             /leadership;

    ~^/uz/fakultetlar/?$                          /faculties;
    ~^/fakultetlar/?$                             /faculties;
    ~^/fakultety/?$                               /faculties;

    ~^/uz/abituriyent/?$                          /applicants;
    ~^/abituriyent/?$                             /applicants;
    ~^/postupayushchim/?$                         /applicants;

    ~^/uz/aloqa/?$                                /contact;
    ~^/aloqa/?$                                   /contact;
    ~^/kontakty/?$                                /contact;

    ~^/uz/galereya/?$                             /gallery;
    ~^/galereya/?$                                /gallery;
    ~^/galereya-foto/?$                           /gallery;

    ~^/uz/vakansiya/?$                            /careers;
    ~^/vakansiyalar/?$                            /careers;
    ~^/vakansii/?$                                /careers;
}
