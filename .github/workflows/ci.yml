name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/15
          SECRET_KEY: ci-test-secret
          ALLOWED_ORIGINS: http://localhost
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=70

  frontend-test:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund

      - run: npm test

      - run: npm run build

      - name: Check bundle size budget
        run: |
          js_size=$(du -bc dist/assets/*.js 2>/dev/null | tail -1 | awk '{print $1}')
          css_size=$(du -bc dist/assets/*.css 2>/dev/null | tail -1 | awk '{print $1}')
          echo "JS:  ${js_size} bytes"
          echo "CSS: ${css_size} bytes"
          # Initial JS budget — 500 KB total uncompressed
          if [ "$js_size" -gt 500000 ]; then
            echo "::warning::Initial JS exceeds 500 KB"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backend lint (ruff)
        run: |
          pip install ruff
          ruff check backend/app || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend lint
        working-directory: frontend
        run: |
          npx --yes prettier --check "src/**/*.{vue,js,ts}" || true

  docker-build:
    name: Docker compose build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: |
          cp .env.example .env
          docker compose build --pull
