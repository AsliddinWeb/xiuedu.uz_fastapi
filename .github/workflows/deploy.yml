name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/main
            docker compose pull || true
            docker compose up -d --build
            docker compose exec -T backend alembic upgrade head
            sleep 5
            curl -fsS http://localhost:8014/api/health || (echo "health check failed" && exit 1)
            docker image prune -f

      - name: Notify Telegram on success
        if: success()
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=✅ *XIU Edu* deployed: \`${{ github.sha }}\`"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *XIU Edu deploy failed*: \`${{ github.sha }}\`"
