services:
  db:
    image: pgvector/pgvector:pg16
    container_name: xiuedu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xiuedu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiuedu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-xiuedu}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xiuedu} -d ${POSTGRES_DB:-xiuedu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xiuedu_net

  redis:
    image: redis:7-alpine
    container_name: xiuedu_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xiuedu_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiuedu_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-xiuedu}:${POSTGRES_PASSWORD:-xiuedu_secret}@db:5432/${POSTGRES_DB:-xiuedu}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - mediadata:/app/media
    expose:
      - "8014"
    networks:
      - xiuedu_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xiuedu_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5176"
    networks:
      - xiuedu_net

  nginx:
    image: nginx:1.27-alpine
    container_name: xiuedu_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/redirects.conf:/etc/nginx/conf.d/00-redirects.conf:ro
      - mediadata:/var/www/media:ro
    ports:
      - "8080:80"
    networks:
      - xiuedu_net

volumes:
  pgdata:
  redisdata:
  mediadata:

networks:
  xiuedu_net:
    driver: bridge
